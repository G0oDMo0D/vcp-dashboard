name: Refresh data

on:
  schedule:
    # 3x daily: 00:10, 08:10, 16:10 UTC (10 min after major 4H bar closes)
    - cron: '10 0,8,16 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write  # needed to push commits back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # first run with full history can take ~30-40 min at 30 req/min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data from Coinglass
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          VCP_DATA_DIR: data/clean
        run: python refresh_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clean/ data/snapshots/ 2>/dev/null || git add data/clean/
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "auto: refresh 4H data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
